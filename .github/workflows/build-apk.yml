name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set APK version from www/version.js
        run: |
          VERSION=$(grep -oP 'const APP_VERSION = "\K[^"]+' www/version.js)
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" android/app/build.gradle
          sed -i "s/versionCode .*/versionCode ${{ github.run_number }}/" android/app/build.gradle
          echo "APK version: $VERSION (code ${{ github.run_number }})"

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk happik-runner.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: happik-runner-apk
          path: happik-runner.apk

      - name: Publish release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Happik Runner v${{ env.APP_VERSION }}
          body: "Version ${{ env.APP_VERSION }} — voir le changelog dans l'application (mode admin du classement)."
          files: happik-runner.apk
          prerelease: false
